<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Master</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Mobile Warning -->
    <div id="mobile-warning" class="hidden">
        <div class="warning-box">
            <h2>PCであそんでね！</h2>
            <p>このゲームはパソコンのキーボードをつかいます。<br>パソコンからアクセスしてね。</p>
        </div>
    </div>

    <!-- Title Screen -->
    <div id="title-screen" class="screen">
        <div class="cyber-grid"></div>
        <div class="title-container">
            <h1 class="glow-text title-anim">Alphabet Master</h1>
        </div>
        <div class="mode-selection">
            <div class="btn-wrapper">
                <button class="btn primary-btn" onclick="startGame('lower')">
                    <span class="btn-text">小文字モード</span>
                </button>
                <div class="badge glow">おすすめ！はじめての人はこちら</div>
            </div>
            <div class="btn-wrapper">
                <button class="btn secondary-btn" onclick="startGame('upper')">
                    <span class="btn-text">大文字モード<br><small>（Shiftキーのれんしゅう）</small></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Play Screen -->
    <div id="play-screen" class="screen hidden">
        <div class="cyber-grid"></div>
        <div class="header">
            <div class="time-container">
                <div class="time-label">TIME</div>
                <div id="time-display" class="time-value">60</div>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <span class="score-label">SCORE</span>
                    <span id="score-display" class="score-value">0</span>
                </div>
                <div class="score-box hi-score-box">
                    <span class="score-label">HI-SCORE</span>
                    <span id="hi-score-display" class="score-value">0</span>
                </div>
            </div>
        </div>
        
        <div class="center-area" id="play-center">
            <div class="level-indicator">
                <div id="level-display" class="level-text">LEVEL 1</div>
            </div>
            <div id="combo-container" class="hidden">
                <div id="combo-display" class="combo-text"></div>
            </div>
            <div id="word-display" class="word-container">
                <!-- Spans for each letter -->
            </div>
        </div>

        <div class="bottom-area">
            <div class="keyboard-container" id="keyboard">
                <!-- Virtual Keyboard generated by JS -->
            </div>
            <div class="hands-container">
                <!-- Hand illustrations / Finger highlights -->
                <div class="hand left-hand">
                   <!-- Fingers -->
                   <div class="finger left-pinky" id="f-lp"></div>
                   <div class="finger left-ring" id="f-lr"></div>
                   <div class="finger left-middle" id="f-lm"></div>
                   <div class="finger left-index" id="f-li"></div>
                   <div class="finger left-thumb" id="f-lt"></div>
                </div>
                <div class="hand right-hand">
                   <div class="finger right-thumb" id="f-rt"></div>
                   <div class="finger right-index" id="f-ri"></div>
                   <div class="finger right-middle" id="f-rm"></div>
                   <div class="finger right-ring" id="f-rr"></div>
                   <div class="finger right-pinky" id="f-rp"></div>
                </div>
            </div>
        </div>
        
        <!-- Effects layer -->
        <canvas id="particles-canvas"></canvas>
        <div id="ui-effects-layer"></div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen hidden">
        <div class="cyber-grid"></div>
        <div class="result-content">
            <h2 class="result-title glow-text">TIME UP!</h2>
            <div class="result-details">
                <div class="result-item">
                    <span class="res-label">SCORE</span>
                    <span id="result-score" class="res-val">0</span>
                </div>
                <div class="result-item">
                    <span class="res-label">MAX COMBO</span>
                    <span id="result-max-combo" class="res-val">0</span>
                </div>
                <div class="result-item">
                    <span class="res-label">HI-SCORE</span>
                    <span id="result-hi-score" class="res-val">0</span>
                </div>
                <div id="new-record-badge" class="hidden glow-text new-record">NEW RECORD!!</div>
            </div>
            <div class="result-buttons">
                <button class="btn primary-btn" onclick="restartGame()">もう一度遊ぶ</button>
                <button class="btn secondary-btn" onclick="goTitle()">タイトルへ戻る</button>
            </div>
        </div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
